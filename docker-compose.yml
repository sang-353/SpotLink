services:
  # ==================== MySQL 8.0 ====================
  mysql:
    image: mysql:8.0
    container_name: spotlink-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: hmdp_db
    command: --sql-mode="NO_ENGINE_SUBSTITUTION,ALLOW_INVALID_DATES"
    ports:
      - "3307:3306"   # 3307 — 避免与本地 MySQL(3306) 冲突
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/db/spotlink.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== Redis 7 ====================
  redis:
    image: redis:7-alpine
    container_name: spotlink-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6380:6379"   # 6380 — 避免与本地 Redis 或已有 Docker Redis 冲突
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # ==================== RabbitMQ 3.9 + 延迟插件 ====================
  rabbitmq:
    build: ./rabbitmq
    container_name: spotlink-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      RABBITMQ_DEFAULT_VHOST: /spotlink
    ports:
      - "5673:5672"     # 5673 — 避免与已有 Docker RabbitMQ(5672) 冲突
      - "15673:15672"   # 管理界面 http://localhost:15673
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
