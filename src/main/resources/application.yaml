server:
  port: 8081
spring:
  application:
    name: spotlink
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/hmdp_db?useSSL=false&serverTimezone=UTC
    username: root
    password: xie060106
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
  data:
    redis:
      host: localhost
      port: 6379
      password: dev123456
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  rabbitmq:
    listener:
      simple:
        prefetch: 5
        concurrency: 3
        max-concurrency: 5
        acknowledge-mode: manual
        retry:
          enabled: false
#          initial-interval: 200ms
#          max-attempts: 3
    host: localhost
    port: 5672
    username: sang
    password: dev123456
    virtual-host: /spotlink
    publisher-confirm-type: correlated
    publisher-returns: false


mybatis-plus:
  type-aliases-package: com.sang.entity # 别名扫描包
# springdoc-openapi 配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: '全部接口'
      paths-to-match: '/**'
    - group: '用户模块'
      paths-to-match: '/user/**'
    - group: '商铺模块'
      paths-to-match: '/shop/**,/shop-type/**'
    - group: '优惠券 & 秒杀'
      paths-to-match: '/voucher/**,/voucher-order/**'
    - group: '博客社交模块'
      paths-to-match: '/blog/**,/blog-comments/**,/follow/**'
    - group: '文件上传'
      paths-to-match: '/upload/**'

# Knife4j 增强配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-swagger-models: true
    enable-document-manage: true
    swagger-model-name: 实体类列表
    enable-version: true
    enable-reload-cache-parameter: false
    enable-after-script: false
    enable-filter-multipart-api-method-type: POST
    enable-filter-multipart-apis: false
    enable-request-cache: true
    enable-host: false
    enable-host-text: localhost:8081
    enable-home-custom: false
    home-custom-path: classpath:markdown/home.md
    enable-search: true
    enable-footer: false
    enable-footer-custom: true
    footer-custom-content: Apache 2.0 | Copyright © 2026 SpotLink

logging:
  level:
    com.sang: debug

# SpotLink 自定义配置
spotlink:
  order:
    # 延迟队列功能开关 — 需 RabbitMQ 安装 rabbitmq_delayed_message_exchange 插件
    delay:
      enabled: true